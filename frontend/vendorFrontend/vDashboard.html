<main>
    <div id = "welcome"> </div>
  <div id="bags"></div>
</main>
<!-- Modal view to edit bags if they havent been collected-->
<div id="editModal" class="modal">
  <div class="modal-content">
    <span class="close" id="editClose">&times;</span>
    <h2>Edit Bag</h2>
    <label>Name</label>
    <input type="text" id="edit-product_name">
    <label>Description</label>
    <textarea id="edit-description" rows="4"></textarea>
    <label>Category</label>
    <select id="edit-category">
      <option value="Pastries">Pastries</option>
      <option value="Sandwiches">Sandwiches</option> <!--need to add all categories-->
    </select>
    <label>Price</label>
    <input type="text" id="edit-price">
    <label>Pickup Start Time</label>
    <input type="time" id="edit-pickup_window_start">
    <label>Pickup End Time</label>
    <input type="time" id="edit-pickup_window_end">
    <label>Quantity</label>
    <input type="number" id="edit-quantity">
    <button id="edit-save" class="bagButton">Save</button>
    
  </div>
</div>


<script>
    function logout() {
  localStorage.clear();
  window.location.href = 'vendorLogin.html';
}   
</script>
<script src="vMain.js"></script>
</body>
