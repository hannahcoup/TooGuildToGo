<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Too Guild To Go</title>
  <link rel="stylesheet" href="vendorLoginstyle.css">
  <link 
  rel="stylesheet" 
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" 
  integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" 
  crossorigin="anonymous" 
  referrerpolicy="no-referrer" 
  />

</head>

<body>

<header>
    <div class = "nav-container"></div>
  <h1>Too Guild To Go</h1>

</header>

<main>
    <div class="loginBox">
    <h2>
      <a href= "../index.html">
      <button type="button" class="button"><i class="fa-solid fa-arrow-left"></i></button>
      </a>
      <br> Let's log you back in! 
  </h2>
  <form id="loginForm">

  <div class="container">
    <label for="email"><b>Email: </b></label>
    <input type="text" id="email" placeholder="Enter Vendor Email..." name="email" required>
    <br>
    <label for="password"><b>Password:</b></label>
    <input type="password" id="password" placeholder="Enter Password..." name="password" required>
    <br>
    <p id="error" style="color: red;"></p>
    <button type="submit" class="button">Login</button>
        <a href= "../index.html">
    <button type="button" class="button">Cancel</button>
    </a>
  </div>

</form>
  </div>

  
</main>

<script src="vAuth.js"></script>
</body>
</html>
