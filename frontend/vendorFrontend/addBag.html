<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Too Guild To Go</title>
  <link rel="stylesheet" href="vStyles.css">
</head>

<body>

<header>
    <div class = "nav-container"></div>
  <h1>Too Guild To Go</h1>
  <nav>
  <ul>
  <li><a href="vDashboard.html">Dashboard</a></li>
  <li><a href="addBag.html">Add Bag</a></li>
  <li><a href="CustomerReservations.html">Customer Reservations</a></li>

  
</ul>
</nav>

</header>
<main>
    <div class="box">
  <h2>Time to add a bag! </h2>
  <form id="addBagForm">

  <div class="container">
    <label for="desc"><b>Description: </b></label><br>
    <textarea id="description" placeholder="Enter bag description..." rows="10" cols="50"> </textarea> <br>
    <hr>
    <label for="category"><b>Category: </b></label>
    <select name="catergory" id="category">
        <option value="Pastries">Pastries</option>
        <option value="Sandwiches">Sandwiches</option>
        <option value="Hot Food">Hot Food</option>
        <option value="Snack">Snack</option>
    </select>
    <hr>
    <label for="price"><b>Price: </b></label>
    <input type="text" name="price" id="price" placeholder="Enter Price...">
<hr>
    <label for="time"><b>Time for collection: </b></label>
    <input type="time" id="time" />
<hr>
    <label for="quantity"><b>Quantity:</b></label>
    <input type="number" id="quantity" min="1" placeholder="How many bags?">
<hr>
<fieldset>
  <legend><b>Allergens</b></legend>

  <label><input type="checkbox" id="allergen-2" name="allergen"> Gluten</label>
  <label><input type="checkbox" id="allergen-4" name="allergen"> Eggs</label>
  <label><input type="checkbox" id="allergen-7" name="allergen"> Milk</label>
  <label><input type="checkbox" id="allergen-10" name="allergen"> Nuts</label>
  <label><input type="checkbox" id="allergen-11" name="allergen"> Peanuts</label>
  <label><input type="checkbox" id="allergen-12" name="allergen"> Sesame</label>
  <label><input type="checkbox" id="allergen-13" name="allergen"> Soya</label>
  <label><input type="checkbox" id="allergen-1" name="allergen"> Celery</label>
  <label><input type="checkbox" id="allergen-3" name="allergen"> Crustaceans</label>
  <label><input type="checkbox" id="allergen-5" name="allergen"> Fish</label>
  <label><input type="checkbox" id="allergen-6" name="allergen"> Lupin</label>
  <label><input type="checkbox" id="allergen-8" name="allergen"> Molluscs</label>
  <label><input type="checkbox" id="allergen-9" name="allergen"> Mustard</label>
  <label><input type="checkbox" id="allergen-14" name="allergen"> Sulphites</label>
</fieldset>
    <div class="allergenSelector">
    <fieldset class="SegmentedControl SegmentedControl--outline">
  <legend class="accessibility-hidden"><b>Allergens</b></legend>

  <label><input type="checkbox" id="is_vegan"> Vegan</label>
  <label><input type="checkbox" id="is_vegetarian"> Vegetarian</label>
  <label><input type="checkbox" id="is_gluten_free"> Gluten-Free</label>
  <label><input type="checkbox" id="contains_meat"> Contains Meat</label>
    <label><input type="checkbox" id="contains_dairy"> Contains Dairy</label>
    <label><input type="checkbox" id="is_spicy"> Spicy</label>
    
</fieldset>
    </div>
  </div>

    <p id="error" style="color: red;"></p>
    <button type="submit" class="button">Add</button>

  <div class="container">
    <a href= "vDashboard.html">
    <button type="button" class="button">Cancel</button>
    </a>
  </div>
  
</form>
</div>


<script src="addBag.js"></script>
</body>
</html>
