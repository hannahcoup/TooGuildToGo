<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Too Guild To Go</title>
  <link rel="stylesheet" href="vStyles.css">
</head>



<body>
  <div class = "sidebar">
  <nav>
    <div class="logo">
                    <img src="../NewCustFrontend/images/logo.png" alt="Logo">
    </div>
  <ul>
  <li><a href="vDashboard.html">Dashboard</a></li>
  <li><a href="addBag.html">Add Bag</a></li>
  <li><a href="CustomerReservations.html">Customer Reservations</a></li>
  <li><a href="vendorProfile.html">Profile</a></li>
  <li><a href="vendorSettings.html">Settings</a></li>
  <li><a href="vendorHelp.html">Help</a></li>

</ul>
</nav>
<button onclick="logout()" class="logoutBtn">Log Out</button>
</div>


<header>
  <h1>Too Guild To Go</h1>
</header>

<main>
  <div class="add-bag-card">
    <h2>Time to add a bag!</h2>

    <form id="addBagForm">
      <div class="form-group">
        <label for="product_name">Bag Name</label>
        <input type="text" id="product_name" name="product_name" placeholder="Enter bag name..." />
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" placeholder="Enter bag description..."></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" name="category">
            <option value="Hot Food">Hot Food</option>
            <option value="Vegetarian">Vegetarian</option>
            <option value="Vegan">Vegan</option>
            <option value="Bakery/Lunch">Bakery/Lunch</option>
            <option value="Lunch">Lunch</option>
            <option value="Snack/Hot Food">Snack/Hot Food</option>
          </select>
        </div>

        <div class="form-group">
          <label for="quantity">Quantity</label>
          <input type="number" id="quantity" min="1" placeholder="How many bags?" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="original_price">Original Price</label>
          <input type="text" id="original_price" name="original_price" placeholder="Enter original price..." />
        </div>

        <div class="form-group">
          <label for="discounted_price">Discounted Price</label>
          <input type="text" id="discounted_price" name="discounted_price" placeholder="Enter discounted price..." />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="pickup_window_start">Start of Pickup Window</label>
          <input type="datetime-local" id="pickup_window_start" />
        </div>

        <div class="form-group">
          <label for="pickup_window_end">End of Pickup Window</label>
          <input type="datetime-local" id="pickup_window_end" />
        </div>
      </div>

      <div class="form-group">
        <label for="expires_at">Expiry Date</label>
        <input type="datetime-local" id="expires_at" />
      </div>

      <div class="form-group">
        <label>Dietary Tags</label>
        <div class="checkbox-group">
          <label><input type="checkbox" id="is_vegan" /> Vegan</label>
          <label><input type="checkbox" id="is_vegetarian" /> Vegetarian</label>
          <label><input type="checkbox" id="is_gluten_free" /> Gluten-Free</label>
          <label><input type="checkbox" id="contains_meat" /> Contains Meat</label>
          <label><input type="checkbox" id="contains_dairy" /> Contains Dairy</label>
          <label><input type="checkbox" id="is_spicy" /> Spicy</label>
        </div>
      </div>

      <div class="form-group">
        <label>Food Items in this bag</label>
        <div id="foodItemsContainer">Loading food items...</div>
      </div>

      <p id="error" style="color: red;"></p>

      <div class="form-actions">
        <button type="submit" class="bagButton">Add</button>
        <a href="vDashboard.html" class="bagButton cancel-link">Cancel</a>
      </div>
    </form>
  </div>
</main>

<script>
    function logout() {
  localStorage.clear();
  window.location.href = 'vendorLogin.html';
}   
</script>
<script src="addBag.js"></script>
</body>
</html>
